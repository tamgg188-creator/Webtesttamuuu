<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamu T-Shirt Hub | প্রিমিয়াম কালেকশন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 shadow-sm px-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center h-16">
            <span class="text-xl font-black text-indigo-600 tracking-tighter">TAMU <span class="text-gray-900 font-light">HUB</span></span>
            <button onclick="toggleCart()" class="relative p-2">
                🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-indigo-600 text-white text-[10px] h-5 w-5 rounded-full flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </nav>

    <header class="bg-indigo-900 text-white py-12 text-center">
        <h1 class="text-3xl font-bold font-black">প্রিমিয়াম টি-শার্ট হাব</h1>
        <p class="text-indigo-200 mt-2 text-sm">পরীক্ষামূলক ওয়েবসাইট</p>
    </header>

    <section class="max-w-7xl mx-auto px-4 py-12">
        <div id="loading" class="text-center py-10 text-indigo-600 font-bold animate-pulse text-lg">টি-শার্ট লোড হচ্ছে... 👕</div>
        <div id="product-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8"></div>
    </section>

    <div id="cart-sidebar" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="toggleCart()"></div>
        <div class="relative bg-white w-full max-w-md p-6 rounded-[30px] shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-bold text-gray-800">আপনার ব্যাগ</h2>
                <button onclick="toggleCart()" class="text-gray-400 text-xl font-bold">✕</button>
            </div>
            <div id="cart-items" class="space-y-4 mb-6 text-sm text-gray-600"></div>
            <div class="bg-indigo-50 p-5 rounded-3xl space-y-4 border border-indigo-100">
                <h3 class="font-bold text-indigo-900 border-b border-indigo-200 pb-2">📍 ডেলিভারি তথ্য</h3>
                <input type="text" id="cust-name" placeholder="আপনার নাম" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-indigo-200">
                <input type="text" id="cust-phone" placeholder="ফোন নম্বর" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-indigo-200">
                <textarea id="cust-addr" placeholder="বাসা নং, রোড, উপজেলা, জেলা..." class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-indigo-200 h-20"></textarea>
                <div class="text-xl font-black text-indigo-900 flex justify-between"><span>মোট:</span> <span id="cart-total">৳০</span></div>
                <button onclick="submitOrder()" id="order-btn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black text-lg shadow-lg active:scale-95 transition-all">অর্ডার নিশ্চিত করুন</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/kma1bg22xwncg";
        let products = [];
        let cart = [];

        async function fetchProducts() {
            try {
                const response = await fetch(`${API_URL}?sheet=products`);
                products = await response.json();
                renderProducts();
            } catch (error) {
                document.getElementById('loading').innerHTML = `<p class="text-red-500">ডাটা লোড করতে সমস্যা হয়েছে।</p>`;
            }
        }

        function renderProducts() {
            document.getElementById('loading').style.display = 'none';
            const container = document.getElementById('product-container');
            container.innerHTML = products.map(p => `
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 p-3 hover:shadow-md transition">
                    <img src="${p.image}" class="w-full h-48 md:h-64 object-cover rounded-xl mb-3">
                    <h3 class="font-bold text-sm h-10 overflow-hidden text-gray-800">${p.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <div class="text-indigo-600 font-black text-lg">৳${p.price}</div>
                        <button onclick="addToCart(${p.id})" class="bg-indigo-600 text-white p-2 rounded-lg font-bold active:scale-90 transition">+ </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id == id);
            if(product) {
                cart.push(product);
                document.getElementById('cart-count').innerText = cart.length;
                
                // আধুনিক টোস্ট মেসেজ
                Swal.fire({
                    title: 'ব্যাগ-এ যোগ হয়েছে!',
                    text: product.name,
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false,
                    toast: true,
                    position: 'top-end'
                });
            }
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('hidden');
            updateCartUI();
        }

        function updateCartUI() {
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('cart-total');
            let total = 0;
            if(cart.length === 0) {
                itemsDiv.innerHTML = "<p class='text-center py-4'>ব্যাগ খালি!</p>";
                totalSpan.innerText = "৳০";
                return;
            }
            itemsDiv.innerHTML = cart.map((item, index) => {
                total += Number(item.price);
                return `<div class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl">
                    <span class="font-semibold text-gray-700 text-xs">${item.name}</span>
                    <div class="flex items-center gap-3">
                        <b class="text-indigo-600">৳${item.price}</b>
                        <button onclick="removeFromCart(${index})" class="text-red-400 font-bold">✕</button>
                    </div>
                </div>`;
            }).join('');
            totalSpan.innerText = "৳" + total;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            document.getElementById('cart-count').innerText = cart.length;
            updateCartUI();
        }

        async function submitOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const addr = document.getElementById('cust-addr').value;
            const btn = document.getElementById('order-btn');

            if(!name || !phone || !addr) {
                return Swal.fire({
                    title: 'তথ্য অসম্পূর্ণ!',
                    text: 'দয়া করে নাম, ফোন এবং ঠিকানা দিন।',
                    icon: 'warning',
                    confirmButtonColor: '#4f46e5'
                });
            }
            if(cart.length === 0) return Swal.fire('ব্যাগ খালি!', '', 'info');

            btn.disabled = true;
            btn.innerText = "অর্ডার প্রসেস হচ্ছে...";

            const orderData = {
                data: [{
                    time: new Date().toLocaleString('bn-BD'),
                    customer: name,
                    phone: phone,
                    items: cart.map(i => i.name).join(', '),
                    total: cart.reduce((s, i) => s + Number(i.price), 0),
                    address: addr
                }]
            };

            try {
                const response = await fetch(`${API_URL}?sheet=orders`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(orderData)
                });
                if(response.ok) {
                    Swal.fire({
                        title: 'অর্ডার সফল! ✅',
                        text: 'আমরা শীঘ্রই যোগাযোগ করব।',
                        icon: 'success',
                        confirmButtonColor: '#4f46e5'
                    }).then(() => {
                        cart = [];
                        location.reload();
                    });
                }
            } catch (e) {
                Swal.fire('ওহ!', 'সমস্যা হয়েছে, আবার চেষ্টা করুন।', 'error');
                btn.disabled = false;
            }
        }
        window.onload = fetchProducts;
    </script>
</body>
</html>
