<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamu T-Shirt Hub | প্রিমিয়াম কালেকশন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 shadow-sm px-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center h-16">
            <span class="text-xl font-black text-indigo-600">TAMU <span class="text-gray-900 font-light">HUB</span></span>
            <button onclick="toggleCart()" class="relative p-2">
                🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-indigo-600 text-white text-[10px] h-5 w-5 rounded-full flex items-center justify-center">0</span>
            </button>
        </div>
    </nav>

    <header class="bg-indigo-900 text-white py-12 text-center">
        <h1 class="text-3xl font-bold">প্রিমিয়াম টি-শার্ট হাব</h1>
        <p class="text-indigo-200 mt-2">সরাসরি গুগল শিট থেকে আপডেটেড কালেকশন</p>
    </header>

    <section class="max-w-7xl mx-auto px-4 py-12">
        <div id="loading" class="text-center py-10 text-indigo-600 font-bold">নতুন টি-শার্ট লোড হচ্ছে... 👕</div>
        <div id="product-container" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </section>

    <div id="cart-sidebar" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60" onclick="toggleCart()"></div>
        <div class="relative bg-white w-full max-w-md p-6 rounded-3xl shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">অর্ডার রিভিউ</h2>
            <div id="cart-items" class="space-y-3 mb-6 text-sm text-gray-600"></div>
            
            <div class="bg-gray-50 p-4 rounded-2xl space-y-3">
                <input type="text" id="cust-name" placeholder="আপনার নাম" class="w-full p-3 border rounded-xl outline-none">
                <input type="text" id="cust-phone" placeholder="ফোন নম্বর" class="w-full p-3 border rounded-xl outline-none">
                <textarea id="cust-addr" placeholder="পুরো ঠিকানা" class="w-full p-3 border rounded-xl outline-none"></textarea>
                <div class="text-lg font-bold flex justify-between"><span>মোট:</span> <span id="cart-total">৳০</span></div>
                <button onclick="submitOrder()" id="order-btn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">অর্ডার কনফার্ম করুন</button>
            </div>
            <button onclick="toggleCart()" class="w-full text-center mt-4 text-gray-400">বন্ধ করুন</button>
        </div>
    </div>

    <script>
        // আপনার API URL এখানে দিন
        const API_URL = https://sheetdb.io/api/v1/kma1bg22xwncg;
        let products = [];
        let cart = [];

        // শিট থেকে প্রোডাক্ট নিয়ে আসা
        async function fetchProducts() {
            try {
                const res = await fetch(`${API_URL}?sheet=products`);
                products = await res.json();
                renderProducts();
            } catch (e) { console.error("Error:", e); }
        }

        function renderProducts() {
            document.getElementById('loading').style.display = 'none';
            const container = document.getElementById('product-container');
            container.innerHTML = products.map(p => `
                <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 p-3">
                    <img src="${p.image}" class="w-full h-48 object-cover rounded-lg mb-3">
                    <h3 class="font-bold text-sm h-10 overflow-hidden">${p.name}</h3>
                    <div class="text-indigo-600 font-bold mb-3">৳${p.price}</div>
                    <button onclick="addToCart(${p.id})" class="w-full bg-gray-900 text-white py-2 rounded-lg text-xs font-bold transition active:scale-95">কার্টে নিন</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id == id);
            cart.push(product);
            document.getElementById('cart-count').innerText = cart.length;
            alert(product.name + " কার্টে যোগ হয়েছে!");
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('hidden');
            updateCartUI();
        }

        function updateCartUI() {
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('cart-total');
            let total = 0;
            
            if(cart.length === 0) {
                itemsDiv.innerHTML = "কার্ট খালি!";
                totalSpan.innerText = "৳০";
                return;
            }

            itemsDiv.innerHTML = cart.map(item => {
                total += Number(item.price);
                return `<div class="flex justify-between"><span>${item.name}</span> <b>৳${item.price}</b></div>`;
            }).join('');
            totalSpan.innerText = "৳" + total;
        }

        // শিটে অর্ডার পাঠানো
        async function submitOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const addr = document.getElementById('cust-addr').value;
            const btn = document.getElementById('order-btn');

            if(!name || !phone || !addr) return alert("তথ্য পূরণ করুন!");

            btn.disabled = true;
            btn.innerText = "অর্ডার প্রসেস হচ্ছে...";

            const orderData = {
                data: [{
                    time: new Date().toLocaleString('bn-BD'),
                    customer: name,
                    phone: phone,
                    items: cart.map(i => i.name).join(', '),
                    total: cart.reduce((s, i) => s + Number(i.price), 0),
                    address: addr
                }]
            };

            try {
                await fetch(`${API_URL}?sheet=orders`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(orderData)
                });
                alert("অর্ডার সফল! আমরা দ্রুত আপনার সাথে যোগাযোগ করব।");
                cart = [];
                location.reload();
            } catch (e) {
                alert("ভুল হয়েছে! আবার চেষ্টা করুন।");
                btn.disabled = false;
            }
        }

        window.onload = fetchProducts;
    </script>
</body>
</html>
